services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: proma
      POSTGRES_PASSWORD: proma
      POSTGRES_DB: proma
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proma -d proma"]
      interval: 3s
      timeout: 3s
      retries: 20
  redis:
    image: redis:7-alpine
    ports:
      - "56379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20
