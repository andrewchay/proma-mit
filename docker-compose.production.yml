services:
  postgres:
    image: postgres:16-alpine
    environment: { POSTGRES_USER: proma, POSTGRES_PASSWORD: proma, POSTGRES_DB: proma }
    volumes: [postgres:/var/lib/postgresql/data]
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U proma -d proma"], interval: 5s, timeout: 3s, retries: 20 }
  redis:
    image: redis:7-alpine
    healthcheck: { test: ["CMD", "redis-cli", "ping"], interval: 5s, timeout: 3s, retries: 20 }
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${PROMA_WEB_S3_ACCESS_KEY_ID:?请设置 PROMA_WEB_S3_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${PROMA_WEB_S3_SECRET_ACCESS_KEY:?请设置 PROMA_WEB_S3_SECRET_ACCESS_KEY}
    volumes: [minio:/data]
  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on: [minio]
    environment:
      MINIO_ROOT_USER: ${PROMA_WEB_S3_ACCESS_KEY_ID:?请设置 PROMA_WEB_S3_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${PROMA_WEB_S3_SECRET_ACCESS_KEY:?请设置 PROMA_WEB_S3_SECRET_ACCESS_KEY}
      PROMA_WEB_S3_BUCKET: ${PROMA_WEB_S3_BUCKET:?请设置 PROMA_WEB_S3_BUCKET}
    entrypoint: ["/bin/sh", "-ec", "until mc alias set proma http://minio:9000 \"$$MINIO_ROOT_USER\" \"$$MINIO_ROOT_PASSWORD\"; do sleep 1; done; mc mb --ignore-existing \"proma/$$PROMA_WEB_S3_BUCKET\""]
  server:
    build: { context: ., dockerfile: apps/server/Dockerfile }
    environment:
      PROMA_WEB_DATABASE_URL: postgres://proma:proma@postgres:5432/proma
      PROMA_WEB_REDIS_URL: redis://redis:6379
      PROMA_WEB_HOST: 0.0.0.0
      PROMA_WEB_WORKSPACE_ROOT: /data/workspaces
      PROMA_WEB_S3_BUCKET: ${PROMA_WEB_S3_BUCKET:?请设置 PROMA_WEB_S3_BUCKET}
      PROMA_WEB_S3_REGION: ${PROMA_WEB_S3_REGION:-us-east-1}
      PROMA_WEB_S3_ENDPOINT: http://minio:9000
      PROMA_WEB_S3_ACCESS_KEY_ID: ${PROMA_WEB_S3_ACCESS_KEY_ID:?请设置 PROMA_WEB_S3_ACCESS_KEY_ID}
      PROMA_WEB_S3_SECRET_ACCESS_KEY: ${PROMA_WEB_S3_SECRET_ACCESS_KEY:?请设置 PROMA_WEB_S3_SECRET_ACCESS_KEY}
      PROMA_WEB_ENVELOPE_KEY: ${PROMA_WEB_ENVELOPE_KEY:?请设置 32 字节 Base64 的 PROMA_WEB_ENVELOPE_KEY}
      PROMA_WEB_EXECUTOR_ENDPOINT: http://executor:3010
      PROMA_WEB_EXECUTOR_TOKEN: ${PROMA_WEB_EXECUTOR_TOKEN:?请设置 PROMA_WEB_EXECUTOR_TOKEN}
      PROMA_WEB_OIDC_ISSUER: ${PROMA_WEB_OIDC_ISSUER:?请设置 PROMA_WEB_OIDC_ISSUER}
      PROMA_WEB_OIDC_AUDIENCE: ${PROMA_WEB_OIDC_AUDIENCE:?请设置 PROMA_WEB_OIDC_AUDIENCE}
      PROMA_WEB_OIDC_JWKS_URL: ${PROMA_WEB_OIDC_JWKS_URL:?请设置 PROMA_WEB_OIDC_JWKS_URL}
      PROMA_WEB_ALERT_WEBHOOK_URL: ${PROMA_WEB_ALERT_WEBHOOK_URL:-}
      PROMA_WEB_SIEM_WEBHOOK_URL: ${PROMA_WEB_SIEM_WEBHOOK_URL:-}
      PROMA_WEB_AWS_KMS_KEY_ID: ${PROMA_WEB_AWS_KMS_KEY_ID:-}
      PROMA_WEB_AWS_REGION: ${PROMA_WEB_AWS_REGION:-}
      PROMA_WEB_AWS_KMS_ENDPOINT: ${PROMA_WEB_AWS_KMS_ENDPOINT:-}
    volumes: [workspaces:/data/workspaces]
    ports: ["3000:3000"]
    healthcheck: { test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:3000/healthz').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"], interval: 10s, timeout: 5s, retries: 20 }
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      executor: { condition: service_healthy }
      minio-init: { condition: service_completed_successfully }
  executor:
    build: { context: ., dockerfile: apps/executor/Dockerfile }
    environment:
      PROMA_EXECUTOR_WORKSPACE_ROOT: /data/workspaces
      PROMA_EXECUTOR_TOKEN: ${PROMA_WEB_EXECUTOR_TOKEN:?请设置 PROMA_WEB_EXECUTOR_TOKEN}
      PROMA_EXECUTOR_ALLOWED_COMMANDS: ${PROMA_EXECUTOR_ALLOWED_COMMANDS:-git,bun}
    volumes: [workspaces:/data/workspaces]
    healthcheck: { test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:3010/healthz').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"], interval: 10s, timeout: 5s, retries: 20 }
  web:
    build: { context: ., dockerfile: apps/web/Dockerfile }
    ports: ["8080:80"]
    healthcheck: { test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null"], interval: 10s, timeout: 5s, retries: 20 }
    depends_on: { server: { condition: service_healthy } }
volumes: { postgres: {}, minio: {}, workspaces: {} }
